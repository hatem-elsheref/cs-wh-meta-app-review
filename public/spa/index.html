  <body>
  <script>
    const stored = localStorage.getItem('meta_whatsapp_app_review_theme');
    if (stored === 'light') {
      document.documentElement.classList.add('light');
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
  </script>
